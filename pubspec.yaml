name: cultioo_business
description: "Sell big"
publish_to: 'none'

version: 1.0.0+16

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any
  cupertino_icons: ^1.0.8
  http: ^1.1.0
  http_parser: ^4.0.2
  shared_preferences: ^2.2.2
  provider: ^6.1.1
  image_picker: ^1.0.4
  camera: ^0.10.5+9
  file_picker: ^8.0.0+1
  url_launcher: ^6.2.2
  flutter_web_auth_2: ^4.0.1
  local_auth: ^2.3.0
  flutter_secure_storage: ^9.0.0
  firebase_messaging: ^15.0.0
  firebase_core: ^3.0.0
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  geolocator: ^12.0.0
  geocoding: ^3.0.0
  permission_handler: ^12.0.1
  path_provider: ^2.1.1
  qr_flutter: ^4.1.0
  image: ^4.1.7
  cupertino_native_better: 1.3.2
  mapbox_maps_flutter: ^2.12.0
  mobile_scanner: ^7.1.3
  apple_maps_flutter: ^1.4.0
  google_sign_in: ^6.2.1
  sign_in_with_apple: ^6.1.0
  firebase_auth: ^5.0.0
  open_filex: ^4.5.0
  google_generative_ai: ^0.4.7
  flutter_svg: ^2.0.0
  
  # macOS-spezifische Packages
  macos_ui: ^2.1.0  # Native macOS UI Components
  window_manager: ^0.4.2  # Window Management für macOS
  screen_retriever: ^0.1.9  # Screen Info für macOS
  pdf: ^3.11.3
  printing: ^5.14.2
  live_activities: ^2.4.7
  flutter_background_service: ^5.0.5
  flutter_local_notifications: ^17.2.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  
  assets:
    - logo/cultioo_business_logo.png
    - logo/cultioo_logo.png
    - logo/cultioo_word_transparent_darkmode.png
    - logo/cultioo_word_transparent_lightmode.png
    - logo/cully_dark.png
    - logo/cully_light.png

    - assets/images/cultioo_logo_light.png
    - assets/images/cultioo_logo_dark.png

  fonts:
    - family: Poppins
      fonts:
        - asset: fonts/Poppins-Thin.ttf
          weight: 100
        - asset: fonts/Poppins-ThinItalic.ttf
          weight: 100
          style: italic
        - asset: fonts/Poppins-ExtraLight.ttf
          weight: 200
        - asset: fonts/Poppins-ExtraLightItalic.ttf
          weight: 200
          style: italic
        - asset: fonts/Poppins-Light.ttf
          weight: 300
        - asset: fonts/Poppins-LightItalic.ttf
          weight: 300
          style: italic
        - asset: fonts/Poppins-Regular.ttf
          weight: 400
        - asset: fonts/Poppins-Italic.ttf
          weight: 400
          style: italic
        - asset: fonts/Poppins-Medium.ttf
          weight: 500
        - asset: fonts/Poppins-MediumItalic.ttf
          weight: 500
          style: italic
        - asset: fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: fonts/Poppins-SemiBoldItalic.ttf
          weight: 600
          style: italic
        - asset: fonts/Poppins-Bold.ttf
          weight: 700
        - asset: fonts/Poppins-BoldItalic.ttf
          weight: 700
          style: italic
        - asset: fonts/Poppins-ExtraBold.ttf
          weight: 800
        - asset: fonts/Poppins-ExtraBoldItalic.ttf
          weight: 800
          style: italic
        - asset: fonts/Poppins-Black.ttf
          weight: 900
        - asset: fonts/Poppins-BlackItalic.ttf
          weight: 900
          style: italic

# Flutter Launcher Icons Configuration (Winter Logo: Dec 1 - Feb 1)
# To switch back to standard logo, change image_path to "logo/cultioo_business_logo.png"
flutter_launcher_icons:
  android: true
  ios: false  # iOS uses native .icon format in Xcode
  image_path: "logo/cultioo_business_logo.png"
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "logo/cultioo_business_logo.png"
  remove_alpha_ios: true
