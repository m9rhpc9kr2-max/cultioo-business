name: Build Linux App

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          channel: 'stable'
      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libx11-dev pkg-config cmake ninja-build libblkid-dev
      - run: flutter pub get
      - run: flutter build linux --release
      - name: Verify Linux build exists
        run: |
          ls -la build/linux/x64/release/bundle/
          if [ ! -f "build/linux/x64/release/bundle/cultioo_business" ]; then
            echo "ERROR: cultioo_business executable not found!"
            exit 1
          fi
      - name: Create AppImage
        run: |
          cd build/linux/x64/release/bundle
          wget https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          chmod +x linuxdeploy-x86_64.AppImage
          ./linuxdeploy-x86_64.AppImage --appdir=AppDir --executable=./cultioo_business --output=appimage
          ls -la *.AppImage
      - name: Upload Linux AppImage
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: linux-app
          path: build/linux/x64/release/bundle/*.AppImage
          retention-days: 30
