name: Build Desktop Apps

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.0'
          channel: 'stable'
      - run: flutter pub get
      - run: flutter build windows --release
      - name: Verify Windows build exists
        run: |
          dir build\windows\x64\runner\Release\
          if not exist "build\windows\x64\runner\Release\cultioo_business.exe" (
            echo ERROR: cultioo_business.exe not found!
            exit /b 1
          )
      - name: Copy release build for Inno Setup
        run: |
          if exist "windows\installer\release_build" rmdir /s /q windows\installer\release_build
          mkdir windows\installer\release_build
          xcopy /E /I /Y build\windows\x64\runner\Release\* windows\installer\release_build\
          dir windows\installer\release_build\
      - name: Build EXE Installer with Inno Setup
        run: |
          choco install innosetup --no-progress -y
          iscc /DAppVersion=${{ github.run_number }}.0.0 windows\installer\cultioo_business.iss
          if not exist "windows\installer\installer_output\cultioo_business_setup.exe" (
            echo ERROR: Installer creation failed!
            exit /b 1
          )
          move windows\installer\installer_output\cultioo_business_setup.exe build\cultioo_business_setup.exe
      - uses: actions/upload-artifact@v4
        with:
          name: windows-app
          path: build/cultioo_business_setup.exe
