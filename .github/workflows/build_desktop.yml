name: Build Desktop Apps

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          channel: 'stable'
      - run: flutter pub get
      - run: flutter build windows --release
      - name: Verify Windows build exists
        run: |
          Get-ChildItem -Path "build\windows\x64\runner\Release\"
          if (-not (Test-Path "build\windows\x64\runner\Release\cultioo_business.exe")) {
            echo "ERROR: cultioo_business.exe not found!"
            exit 1
          }
      - name: Copy release build for Inno Setup
        run: |
          if (Test-Path "windows\installer\release_build") { Remove-Item -Path "windows\installer\release_build" -Recurse -Force }
          New-Item -ItemType Directory -Path "windows\installer\release_build" -Force | Out-Null
          Copy-Item -Path "build\windows\x64\runner\Release\*" -Destination "windows\installer\release_build\" -Recurse -Force
          Get-ChildItem -Path "windows\installer\release_build\"
      - name: Build EXE Installer with Inno Setup
        run: |
          echo "Installing Inno Setup..."
          choco install innosetup --no-progress -y
          echo "Waiting for Inno Setup installation..."
          Start-Sleep -Seconds 5
          echo "Verifying Inno Setup installation..."
          $isccPath = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          if (Test-Path $isccPath) {
            echo "Inno Setup found at: $isccPath"
          } else {
            echo "ERROR: Inno Setup not found at expected location"
            Get-ChildItem "C:\Program Files (x86)\" | Where-Object { $_.Name -like "*Inno*" }
            exit 1
          }
          echo "Building installer..."
          & $isccPath /DAppVersion=${{ github.run_number }}.0.0 "windows\installer\cultioo_business.iss"
          if ($LASTEXITCODE -ne 0) {
            echo "ERROR: Inno Setup compilation failed with exit code $LASTEXITCODE"
            exit 1
          }
          echo "Checking for installer output..."
          if (Test-Path "windows\installer\installer_output\cultioo_business_setup.exe") {
            echo "Installer created successfully"
            echo "Moving installer to build folder..."
            Move-Item -Path "windows\installer\installer_output\cultioo_business_setup.exe" -Destination "build\cultioo_business_setup.exe" -Force
            echo "Installer ready!"
          } else {
            echo "ERROR: Installer creation failed!"
            Get-ChildItem -Path "windows\installer" -Recurse
            exit 1
          }
      - name: Upload Windows Installer
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: windows-app
          path: build/cultioo_business_setup.exe
          retention-days: 30
      - name: Show build directory on failure
        if: failure()
        run: |
          echo "Build directory contents:"
          if (Test-Path "build") { Get-ChildItem -Path "build" -Recurse } else { echo "build directory not found" }
          echo "Windows installer directory contents:"
          if (Test-Path "windows\installer") { Get-ChildItem -Path "windows\installer" -Recurse } else { echo "windows\installer directory not found" }
          echo "Inno Setup output:"
          if (Test-Path "windows\installer\installer_output") { Get-ChildItem -Path "windows\installer\installer_output" -Recurse } else { echo "installer_output directory not found" }
