name: Build Desktop Apps

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.0'
          channel: 'stable'
      - run: flutter pub get
      - run: flutter build macos --release
      - name: Zip macOS app
        run: |
          cd build/macos/Build/Products/Release
          zip -r ../../../cultioo_business_macos.zip cultioo_business.app
      - uses: actions/upload-artifact@v4
        with:
          name: macos-app
          path: build/cultioo_business_macos.zip

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.0'
          channel: 'stable'
      - run: flutter pub get
      - run: flutter build windows --release
      - name: Verify Windows build exists
        run: |
          dir build\windows\x64\runner\Release\
          if not exist "build\windows\x64\runner\Release\cultioo_business.exe" (
            echo ERROR: cultioo_business.exe not found!
            exit /b 1
          )
      - name: Copy release build for Inno Setup
        run: |
          if exist "windows\installer\release_build" rmdir /s /q windows\installer\release_build
          mkdir windows\installer\release_build
          xcopy /E /I /Y build\windows\x64\runner\Release\* windows\installer\release_build\
          dir windows\installer\release_build\
      - name: Build EXE Installer with Inno Setup
        run: |
          choco install innosetup --no-progress -y
          iscc /DAppVersion=${{ github.run_number }}.0.0 windows\installer\cultioo_business.iss
          if not exist "windows\installer\installer_output\cultioo_business_setup.exe" (
            echo ERROR: Installer creation failed!
            exit /b 1
          )
          move windows\installer\installer_output\cultioo_business_setup.exe build\cultioo_business_setup.exe
      - uses: actions/upload-artifact@v4
        with:
          name: windows-app
          path: build/cultioo_business_setup.exe

  build-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.0'
          channel: 'stable'
      - run: flutter pub get
      - run: flutter build web --release
      - name: Zip web build
        run: |
          cd build
          zip -r cultioo_business_web.zip web/
      - uses: actions/upload-artifact@v4
        with:
          name: web-app
          path: build/cultioo_business_web.zip

  release:
    needs: [build-macos, build-windows, build-web]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: macos-app
          path: ./release/
      - uses: actions/download-artifact@v4
        with:
          name: windows-app
          path: ./release/
      - uses: actions/download-artifact@v4
        with:
          name: web-app
          path: ./release/
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: Release v${{ github.run_number }}
          files: ./release/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
